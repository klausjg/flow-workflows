name: Bump version & release (reusable)

on:
  workflow_call:
    inputs:
      rev:
        required: false
        type: string
      title:
        required: false
        type: string
      notes:
        required: false
        type: string
    secrets:
      RELEASE_PAT:
        required: true

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Prepare release notes
        id: notes
        env:
          INPUT_NOTES: ${{ inputs.notes }}
        shell: bash
        run: |
          set -e
          if [ -n "$INPUT_NOTES" ]; then
            printf '%s' "$INPUT_NOTES" > /tmp/release_notes.md
            echo "source=input" >> "$GITHUB_OUTPUT"
          elif [ -f RELEASE_NOTES.md ] && [ -s RELEASE_NOTES.md ]; then
            cp RELEASE_NOTES.md /tmp/release_notes.md
            echo "source=file" >> "$GITHUB_OUTPUT"
          else
            printf '' > /tmp/release_notes.md
            echo "source=empty" >> "$GITHUB_OUTPUT"
          fi
          echo "----- release notes preview -----"
          cat /tmp/release_notes.md
          echo "---------------------------------"

      - name: Resolve release title
        id: title
        env:
          INPUT_TITLE: ${{ inputs.title }}
        shell: bash
        run: |
          set -e
          if [ -n "$INPUT_TITLE" ]; then
            FINAL_TITLE="$INPUT_TITLE"
          elif [ -f RELEASE_NOTES.md ]; then
            # '## 🎉 이번 릴리즈 요약' 섹션 바로 아래의 첫 번째 비어있지 않은 불릿을 타이틀로 사용
            FINAL_TITLE=$(awk '
              /^##[[:space:]]+🎉[[:space:]]*이번[[:space:]]*릴리즈[[:space:]]*요약/ {found=1; next}
              found && /^##[[:space:]]/ {found=0}
              found && /^-[[:space:]]*/ {
                sub(/^-[[:space:]]*/, "")
                gsub(/^[[:space:]]+|[[:space:]]+$/, "")
                if (length($0) > 0) { print; exit }
              }
            ' RELEASE_NOTES.md)
          fi
          if [ -z "$FINAL_TITLE" ]; then
            echo "❌ title이 비어있고 RELEASE_NOTES.md의 '이번 릴리즈 요약'에서도 제목을 찾지 못했습니다."
            exit 1
          fi
          echo "resolved title: $FINAL_TITLE"
          echo "value=$FINAL_TITLE" >> "$GITHUB_OUTPUT"

      - name: Update version.json
        id: bump
        env:
          INPUT_REV: ${{ inputs.rev }}
          INPUT_TITLE: ${{ steps.title.outputs.value }}
        shell: bash
        run: |
          set -e
          CUR=$(python3 -c "import json;print(json.load(open('version.json'))['rev'])")
          if [ -z "$INPUT_REV" ]; then
            NEW=$((CUR + 1))
          else
            NEW="$INPUT_REV"
          fi
          export NEW_REV="$NEW"
          export DATE="$(TZ=Asia/Seoul date +%Y-%m-%d)"
          export TIME="$(TZ=Asia/Seoul date +%H:%M)"
          python3 - <<'PY'
          import json, os
          p = 'version.json'
          d = json.load(open(p, encoding='utf-8'))
          d['rev'] = int(os.environ['NEW_REV'])
          d['releaseDate'] = os.environ['DATE']
          d['releaseTime'] = os.environ['TIME']
          d['title'] = os.environ['INPUT_TITLE']
          notes = open('/tmp/release_notes.md', encoding='utf-8').read().strip()
          if notes:
            d['notes'] = notes
          json.dump(d, open(p, 'w', encoding='utf-8'),
            ensure_ascii=False, indent=2)
          open(p, 'a', encoding='utf-8').write('\n')
          PY
          echo "new_rev=$NEW" >> "$GITHUB_OUTPUT"

      - name: Reset RELEASE_NOTES.md to template
        if: steps.notes.outputs.source == 'file'
        run: |
          cat > RELEASE_NOTES.md <<'EOF'
          ## 🎉 이번 릴리즈 요약
          -
          ## ✨ 추가된 기능
          -
          ## 🔧 변경/개선
          -
          ## 🐛 수정된 문제
          -
          ## 📝 기타
          -
          EOF

      - name: Commit & tag
        env:
          NEW_REV: ${{ steps.bump.outputs.new_rev }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add version.json RELEASE_NOTES.md 2>/dev/null || git add version.json
          git commit -m "chore: bump to rev-$NEW_REV"
          git tag "rev-$NEW_REV"
          git push origin HEAD --tags

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
          NEW_REV: ${{ steps.bump.outputs.new_rev }}
          TITLE: ${{ steps.title.outputs.value }}
        run: |
          gh release create "rev-$NEW_REV" \
            --title "Rev. $NEW_REV - $TITLE" \
            --notes-file /tmp/release_notes.md
