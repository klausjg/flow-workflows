name: Notify Notion on Release (reusable)

on:
  workflow_call:
    inputs:
      app_name:
        required: true
        type: string
      app_page_id:
        required: true
        type: string
    secrets:
      NOTION_TOKEN:
        required: true
      NOTION_RELEASES_DB_ID:
        required: true
      GAS_RELEASE_WEBHOOK_URL:
        required: false
      GAS_RELEASE_SECRET:
        required: false

jobs:
  notify-notion:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Read version.json
        id: version
        run: |
          if [ ! -f version.json ]; then
            echo "❌ version.json 파일이 레포 루트에 없습니다."
            exit 1
          fi
          REV=$(jq -r '.rev' version.json)
          DATE=$(jq -r '.releaseDate' version.json)
          TIME=$(jq -r '.releaseTime // ""' version.json)
          TITLE=$(jq -r '.title // "Release"' version.json)
          NOTES=$(jq -r '.notes // ""' version.json)
          if [ -n "$TIME" ]; then
            ISO_DATE="${DATE}T${TIME}:00+09:00"
          else
            ISO_DATE="$DATE"
          fi
          echo "rev=$REV"           >> "$GITHUB_OUTPUT"
          echo "date=$DATE"         >> "$GITHUB_OUTPUT"
          echo "time=$TIME"         >> "$GITHUB_OUTPUT"
          echo "iso_date=$ISO_DATE" >> "$GITHUB_OUTPUT"
          {
            echo "title<<TITLE_EOF"
            echo "$TITLE"
            echo "TITLE_EOF"
          } >> "$GITHUB_OUTPUT"
          {
            echo "notes<<NOTES_EOF"
            echo "$NOTES"
            echo "NOTES_EOF"
          } >> "$GITHUB_OUTPUT"
          echo "읽은 값: Rev.$REV ($ISO_DATE) - $TITLE"

      # ─────────────────────────────────────────────
      # 직전 release publish 시각 알아내기 (옵션 2 시간 필터용)
      # ─────────────────────────────────────────────
      - name: Find previous release timestamp
        id: prev_release
        env:
          GH_TOKEN: ${{ github.token }}
          CUR_REV: ${{ steps.version.outputs.rev }}
        run: |
          # 모든 release 내림차순으로 가져와서, 현재 rev 다음으로 publish된 것
          PREV_AT=$(gh release list --limit 20 --json publishedAt,tagName \
            | jq -r --arg cur "rev-$CUR_REV" \
              '[.[] | select(.tagName != $cur)] | sort_by(.publishedAt) | reverse | .[0].publishedAt // ""')
          echo "직전 release 시각: ${PREV_AT:-(없음 — 첫 release로 처리)}"
          echo "prev_at=$PREV_AT" >> "$GITHUB_OUTPUT"

      - name: Create Notion Release entry
        id: notion_create
        env:
          NOTION_TOKEN:  ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID:  ${{ secrets.NOTION_RELEASES_DB_ID }}
          APP_NAME:      ${{ inputs.app_name }}
          APP_PAGE_ID:   ${{ inputs.app_page_id }}
          REV:           ${{ steps.version.outputs.rev }}
          DATE:          ${{ steps.version.outputs.date }}
          ISO_DATE:      ${{ steps.version.outputs.iso_date }}
          TITLE:         ${{ steps.version.outputs.title }}
          NOTES:         ${{ steps.version.outputs.notes }}
          RELEASE_BODY:  ${{ github.event.release.body }}
          RELEASE_URL:   ${{ github.event.release.html_url }}
        run: |
          if [ -n "${RELEASE_BODY//[[:space:]]/}" ]; then
            SUMMARY="$RELEASE_BODY"
            echo "요약 소스: GitHub Release body"
          else
            SUMMARY="$NOTES"
            echo "요약 소스: version.json notes (Release body 비어있음 또는 수동실행)"
          fi
          TITLE_ONELINE=$(printf '%s' "$TITLE" | head -n1)
          if [ "${#SUMMARY}" -gt 1990 ]; then
            SUMMARY="${SUMMARY:0:1990}…(이하 생략, 전체 내용은 GitHub Release 참조)"
          fi
          PAYLOAD=$(jq -n \
            --arg db_id "$NOTION_DB_ID" \
            --arg app_page_id "$APP_PAGE_ID" \
            --arg rev_name "$APP_NAME Rev. $REV — $TITLE_ONELINE" \
            --argjson rev_num "$REV" \
            --arg release_date "$ISO_DATE" \
            --arg summary "$SUMMARY" \
            --arg release_url "$RELEASE_URL" \
            '{
              parent: { database_id: $db_id },
              properties: {
                "리비전명": { title: [{ text: { content: $rev_name } }] },
                "앱": { relation: [{ id: $app_page_id }] },
                "리비전 번호": { number: $rev_num },
                "배포일": { date: { start: $release_date } },
                "요약": { rich_text: [{ text: { content: $summary } }] },
                "GitHub Release": ( if $release_url == "" then null else { url: $release_url } end )
              } | with_entries(select(.value != null))
            }')
          echo "보낼 데이터:"
          echo "$PAYLOAD" | jq .
          HTTP_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST https://api.notion.com/v1/pages \
            -H "Authorization: Bearer $NOTION_TOKEN" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          HTTP_CODE=$(echo "$HTTP_RESPONSE" | tail -n1)
          BODY=$(echo "$HTTP_RESPONSE" | sed '$d')
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Notion API 오류 (HTTP $HTTP_CODE)"
            echo "$BODY" | jq . || echo "$BODY"
            exit 1
          fi
          NEW_PAGE_ID=$(echo "$BODY" | jq -r '.id')
          echo "✅ Notion Releases DB에 $APP_NAME Rev. $REV 기록 완료 (page id: $NEW_PAGE_ID)"
          echo "page_id=$NEW_PAGE_ID" >> "$GITHUB_OUTPUT"

      # ─────────────────────────────────────────────
      # NEW: GAS 웹앱 호출로 Backlog 일괄 처리
      #      (GAS_RELEASE_WEBHOOK_URL secret이 등록돼있을 때만 실행)
      # ─────────────────────────────────────────────
      - name: Trigger GAS for Backlog auto-completion
        env:
          WEBHOOK_URL: ${{ secrets.GAS_RELEASE_WEBHOOK_URL }}
          SHARED_SECRET: ${{ secrets.GAS_RELEASE_SECRET }}
          REV_PAGE_ID: ${{ steps.notion_create.outputs.page_id }}
          APP_NAME: ${{ inputs.app_name }}
          PREV_AT: ${{ steps.prev_release.outputs.prev_at }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "GAS_RELEASE_WEBHOOK_URL secret 미등록 → GAS 호출 skip"
            exit 0
          fi
          PAYLOAD=$(jq -n \
            --arg secret "$SHARED_SECRET" \
            --arg revPage "$REV_PAGE_ID" \
            --arg app "$APP_NAME" \
            --arg prev "$PREV_AT" \
            '{ sharedSecret: $secret, revisionPageId: $revPage, appName: $app, lastReleaseAt: ($prev | if . == "" then null else . end) }')
          echo "GAS 호출 페이로드:"
          echo "$PAYLOAD" | jq .
          # GAS Web App은 302 redirect를 보내는데, curl -L 기본 동작은 redirect 시
          # POST를 GET으로 변환 → GAS가 405 Method Not Allowed로 응답.
          # --post301/302/303 으로 redirect 후에도 POST 유지.
          HTTP_RESPONSE=$(curl -sL --post301 --post302 --post303 -w "\n%{http_code}" -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          HTTP_CODE=$(echo "$HTTP_RESPONSE" | tail -n1)
          BODY=$(echo "$HTTP_RESPONSE" | sed '$d')
          echo "GAS 응답 (HTTP $HTTP_CODE):"
          echo "$BODY" | jq . || echo "$BODY"
          # GAS는 항상 200을 반환하므로 본문의 ok 플래그로 성공 판단
          OK=$(echo "$BODY" | jq -r '.ok // false')
          if [ "$OK" != "true" ]; then
            echo "❌ GAS 처리 실패"
            exit 1
          fi
          echo "✅ GAS Backlog 일괄 처리 완료"
